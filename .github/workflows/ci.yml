name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install GCC
        run: sudo apt-get install -y gcc
      - name: Build
        run: gcc -Wall -o gc src/main.c src/heap.c src/object.c src/gc.c
      - name: Run demos
        run: ./gc